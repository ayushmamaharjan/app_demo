# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Sample App Workflow

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./
    env:
      BUILD_PREFIX: true
      IS_MAIN: ${{ github.ref == 'refs/heads/main' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }}

    # Site Testing steps
    - name: Install dependencies
      run: npm ci

    - name: Build
      run: CI=false npm run build

    - name: Run Unit Tests and generate coverage report
      run: npm run test.coverage

    # Only run the last 2 steps when we are not on the main branch
#    - name: Run Storybook tests
#      if: ${{ !env.IS_MAIN }}
#      run: npm run test.storybook.ci

    # E2E tests using Sauce Labs / Screener were removed — add back if you
    # provide corresponding secrets and want remote browser testing.
